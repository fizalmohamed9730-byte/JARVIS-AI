version: '3.8'

services:
  # ============================================
  # Backend - Development Mode
  # ============================================
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: builder
    container_name: jarvis-backend-dev
    ports:
      - "8000:8000"
      - "5678:5678"  # Debug port
    environment:
      - DATABASE_URL=postgresql://jarvis:jarvis_secret@postgres:5432/jarvis_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-not-for-production
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ../backend:/app/backend
      - ../vision:/app/vision
      - ../notes:/app/notes
      - ../plugins:/app/plugins
      - app_data:/app/data
      - app_logs:/app/logs
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --debug"
    networks:
      - jarvis-network
    restart: unless-stopped

  # ============================================
  # Frontend - Development Mode
  # ============================================
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: jarvis-frontend-dev
    ports:
      - "3000:3000"
      - "3001:3001"  # Debug port
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    networks:
      - jarvis-network
    restart: unless-stopped

  # ============================================
  # PostgreSQL - Development Mode
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: jarvis-postgres-dev
    environment:
      - POSTGRES_DB=jarvis_db
      - POSTGRES_USER=jarvis
      - POSTGRES_PASSWORD=jarvis_secret
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - jarvis-network
    restart: unless-stopped

  # ============================================
  # Redis - Development Mode
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: jarvis-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - jarvis-network
    restart: unless-stopped

  # ============================================
  # Mailhog - Development Email Testing
  # ============================================
  mailhog:
    image: mailhog/mailhog
    container_name: jarvis-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - jarvis-network

  # ============================================
  # Flower - Celery Monitoring (if using Celery)
  # ============================================
  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: jarvis-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A backend.tasks flower --port=5555
    volumes:
      - ../backend:/app/backend
    depends_on:
      - redis
    networks:
      - jarvis-network
    profiles:
      - monitoring

volumes:
  app_data:
  app_logs:
  postgres_data_dev:
  redis_data_dev:
  frontend_node_modules:

networks:
  jarvis-network:
    driver: bridge
